<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    /* Spinning disco ball emoji */
    .disco {
      animation: spin 4s linear infinite;
      font-size: 100px;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    /* Message styling */
    #message {
      font-size: 64px;
      margin-top: 20px;
      text-align: center;
    }

    /* Container for dancing gifs */
    #dancers {
      position: absolute;
      bottom: 20px;
      left: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 20px;
    }

    #dancers img {
      width: 150px;
      height: auto;
    }
  </style>
</head>
<body>
  <!-- Disco ball emoji that spins -->
  <div class="disco">🫩</div>

  <!-- Main message -->
  <div id="message">sup, weirdo.</div>

  <!-- Dancing gifs at the bottom; you can swap these URLs for any gifs you prefer -->
  <div id="dancers">
    <img src="https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif" alt="Dancing 1">
    <img src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif" alt="Dancing 2">
    <img src="https://media.giphy.com/media/3o7aD2saalBwwftBIY/giphy.gif" alt="Dancing 3">
  </div>
</body>
</html>
